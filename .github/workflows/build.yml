name: Build and Package

on:
  push:
    branches: ["main"]
  release:
    types: [created]

permissions:
  contents: write  # needed to attach artifacts to releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Quality gates ──────────────────────────────────────────────────────

      - name: Audit dependencies (high+ only)
        # Fails on high or critical severity vulnerabilities.
        # Moderate findings in the build toolchain are tracked but not blocking.
        run: npm audit --audit-level=high

      - name: Static security scan
        # Blocks forbidden APIs (innerHTML, eval, fetch, WebSocket…) and
        # validates that all runtime dependencies are from approved publishers.
        run: node scripts/check-security.js

      - name: Type check
        # Uses the project tsconfig (noImplicitAny, skipLibCheck).
        # strict mode is intentionally disabled — pbiviz 7.x generates plugin
        # code with optional constructor args that strict null checks reject.
        run: npx tsc --noEmit --project tsconfig.json

      - name: Lint
        run: npm run lint

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Sync version to pbiviz.json
        # release-please updates package.json (semver). pbiviz.json requires
        # a 4-part version; this step appends .0 to keep both in sync.
        run: |
          node -e "
            const fs = require('fs');
            const version = require('./package.json').version + '.0';
            const pbiviz = JSON.parse(fs.readFileSync('pbiviz.json', 'utf8'));
            pbiviz.visual.version = version;
            fs.writeFileSync('pbiviz.json', JSON.stringify(pbiviz, null, 4) + '\n');
            console.log('pbiviz.json version set to ' + version);
          "

      - name: Package visual
        run: npm run package
        # prepackage (generate-icon.js) runs automatically before this step

      # ── Artifacts ─────────────────────────────────────────────────────────

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-text-slicer-${{ github.sha }}
          path: dist/*.pbiviz
          retention-days: 30

      - name: Attach .pbiviz to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pbiviz
